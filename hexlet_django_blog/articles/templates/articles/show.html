{% extends "base.html" %}

{% block content %}
    <h1>Статья</h1>
    <h2>{{ article.name }}</h2>
    <div>{{ article.body|slice:":200" }}</div>
    <a href="{% url 'article_update' article.id %}">Редактировать</a>
    <form action="{% url 'article_delete' article.id %}" method="post">
    {% csrf_token %}
        <input type="submit" value="Удалить">
    </form>
{% endblock %}
